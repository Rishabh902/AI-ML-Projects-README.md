<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
</head>

<body>

<h2>Customer Churn Prediction</h2>

<form action="/predict" method="get">

<label>Tenure (Months)</label><br>
<input type="number" name="tenure" required><br><br>

<label>Monthly Charges</label><br>
<input type="number" name="monthly_charges" required><br><br>

<label>Total Charges</label><br>
<input type="number" name="total_charges" required><br><br>

<button type="submit">Predict</button>

</form>

<br>

{% if result %}
<h3>Prediction Result:</h3>
<h2>{{ result }}</h2>
{% endif %}

</body>
</html>
