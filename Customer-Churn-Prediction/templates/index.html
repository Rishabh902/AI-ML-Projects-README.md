<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Customer Churn Prediction</h2>

    <form action="/predict" method="post">

        <label>Gender</label>
        <select name="gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Senior Citizen</label>
        <select name="senior_citizen">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Partner</label>
        <select name="partner">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Dependents</label>
        <select name="dependents">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Tenure (Months)</label>
        <input type="number" name="tenure" min="0" required>

        <label>Monthly Charges</label>
        <input type="number" step="any" name="monthly_charges" min="0" required>

        <label>Total Charges</label>
        <input type="number" step="any" name="total_charges" min="0" required>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
    <div class="result">
        {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
