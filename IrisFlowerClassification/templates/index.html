<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Classifier</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        input {
            margin: 10px;
            padding: 8px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Iris Flower Classification 🌸</h1>

    <form action="/predict" method="post">
        <input type="number" step="any" name="sepal_length" placeholder="Sepal Length" required><br>
        <input type="number" step="any" name="sepal_width" placeholder="Sepal Width" required><br>
        <input type="number" step="any" name="petal_length" placeholder="Petal Length" required><br>
        <input type="number" step="any" name="petal_width" placeholder="Petal Width" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            Predicted Species: <b>{{ prediction }}</b>
        </div>
    {% endif %}

</body>
</html>
